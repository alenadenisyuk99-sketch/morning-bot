name: Morning Clown

on:
  schedule:
    - cron: '0 6 * * *'  # 9:00 Kyiv (UTC+3)
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send clown
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 scripts/clown.py
